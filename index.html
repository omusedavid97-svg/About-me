<html>
<head>
    <title>Deposit Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: margin: 0;
            margin-top: 50px;
        }

        #formSection {
            display: none;
            margin-top: 20px;
        }

        input, select {
            padding: 10px;
            margin: 8px;
            width: 250px;
        }

        button {
            padding: 30px 50px;
            margin: 7px;
            cursor: pointer;
        }

        #result {
            margin-top: 40px;
            font-weight: italic;
        }
    </style>
</head>
<body>

    <h1>Welcome</h1>
    <p>Do you accept the terms and conditions?</p>

    <button onclick="acceptTerms()">Yes</button>
    <button onclick="declineTerms()">No</button>

    <div id="formSection">
        <h2>Deposit Information</h2>

        <select id="gender">
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>
        <br>

        <input type="text" id="idNumber" placeholder="Enter ID Number">
        <br>

        <input type="password"
               id="passcode"
               maxlength="4"
               pattern="[0-9]{4}"
               placeholder="Enter 4-Digit Passcode">
        <br>

        <input type="number" id="amount" placeholder="Deposit Amount">
        <br>

        <button onclick="submitForm()">Submit</button>

        <p id="result"></p>
    </div>

    <script>
        function acceptTerms() {
            document.getElementById("formSection").style.display = "block";
        }

        function declineTerms() {
            alert("You must accept the terms to continue.");
        }

        function submitForm() {
            let gender = document.getElementById("gender").value;
            let idNumber = document.getElementById("idNumber").value;
            let passcode = document.getElementById("passcode").value;
            let amount = document.getElementById("amount").value;

            if (!gender) {
                alert("Please select your gender.");
                return;
            }

            if (!idNumber) {
                alert("Please enter your ID number.");
                return;
            }

            if (!/^[0-9]{4}$/.test(passcode)) {
                alert("Passcode must be exactly 4 digits.");
                return;
            }

            if (amount <= 0) {
                alert("Please enter a valid deposit amount.");
                return;
            }

            document.getElementById("result").innerHTML =
                "Details submitted successfully! Deposit amount: $" + amount;
        }
    </script>

</body>

<html>
<head>
    <title>Deposit Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #419ef0, #b658df);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: rgb(241, 225, 225);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        h1, h2 {
            color: #4a148c;
            text-align: center;
        }

        label {
            font-weight: bold;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 2px solid #4facfe;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .yes-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
        }

        .no-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
        }

        .submit-btn {
            background: #8e44ad;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #3d134e;
        }

        #formSection {
            display: none;
        }

        #result {
            text-align: center;
            color: green;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome</h1>
    <p style="text-align:center;">Do you accept the terms and conditions?</p>

    <div style="text-align:center;">
        <button class="yes-btn" onclick="acceptTerms()">YES</button>
        <button class="no-btn" onclick="declineTerms()">NO</button>
    </div>

    <div id="formSection">
        <h2>Registration & Deposit Form</h2>

        <label>Gender</label>
        <select id="gender">
            <option>Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <label>ID Number</label>
        <input type="text" id="idNumber">

        <label>4 Digit Passcode</label>
        <input type="password" id="passcode" maxlength="4">

        <label>Nationality</label>
        <input type="text" id="nationality">

        <label>Business Place</label>
        <input type="text" id="businessPlace">

        <label>Marital Status</label>
        <select id="maritalStatus">
            <option>Single</option>
            <option>Married</option>
            <option>Divorced</option>
            <option>Widowed</option>
        </select>

        <label>Do You Have a Spouse?</label>
        <select id="spouse">
            <option>Yes</option>
            <option>No</option>
        </select>

        <label>Number of Children</label>
        <input type="number" id="children">

        <label>Preferred Place of Study</label>
        <input type="text" id="studyPlace">

        <label>Date of Birth</label>
        <input type="date" id="dob">

        <label>Number of Family Members</label>
        <input type="number" id="familyMembers">

        <label>Deposit Amount</label>
        <input type="number" id="amount">

        <button class="submit-btn" onclick="submitForm()">Submit</button>

        <p id="result"></p>
    </div>
</div>

<script>
    function acceptTerms() {
        document.getElementById("formSection").style.display = "block";
    }

    function declineTerms() {
        alert("You must accept the terms to continue.");
    }

    function submitForm() {
        let amount = document.getElementById("amount").value;

        if(amount <= 0){
            alert("Please enter a valid deposit amount.");
            return;
        }

        document.getElementById("result").innerHTML =
        "✅ Registration completed successfully! Deposit Amount: $" + amount;
    }
</script>

</body>
</html>
