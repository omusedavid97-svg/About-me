<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head><!DOCTYPE html>
<html>
<head>
    <title>Deposit Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        #formSection {
            display: none;
            margin-top: 20px;
        }

        input, select {
            padding: 10px;
            margin: 8px;
            width: 250px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Welcome</h1>
    <p>Do you accept the terms and conditions?</p>

    <button onclick="acceptTerms()">Yes</button>
    <button onclick="declineTerms()">No</button>

    <div id="formSection">
        <h2>Deposit Information</h2>

        <select id="gender">
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>
        <br>

        <input type="text" id="idNumber" placeholder="Enter ID Number">
        <br>

        <input type="password"
               id="passcode"
               maxlength="4"
               pattern="[0-9]{4}"
               placeholder="Enter 4-Digit Passcode">
        <br>

        <input type="number" id="amount" placeholder="Deposit Amount">
        <br>

        <button onclick="submitForm()">Submit</button>

        <p id="result"></p>
    </div>

    <script>
        function acceptTerms() {
            document.getElementById("formSection").style.display = "block";
        }

        function declineTerms() {
            alert("You must accept the terms to continue.");
        }

        function submitForm() {
            let gender = document.getElementById("gender").value;
            let idNumber = document.getElementById("idNumber").value;
            let passcode = document.getElementById("passcode").value;
            let amount = document.getElementById("amount").value;

            if (!gender) {
                alert("Please select your gender.");
                return;
            }

            if (!idNumber) {
                alert("Please enter your ID number.");
                return;
            }

            if (!/^[0-9]{4}$/.test(passcode)) {
                alert("Passcode must be exactly 4 digits.");
                return;
            }

            if (amount <= 0) {
                alert("Please enter a valid deposit amount.");
                return;
            }

            document.getElementById("result").innerHTML =
                "Details submitted successfully! Deposit amount: $" + amount;
        }
    </script>

</body>
</html>
