<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omuse Grocery</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fff1f8 0%, #effaf3 50%, #e7f7ff 100%);
            color: #1f3d2e;
        }
        .hero {
            padding: 60px 20px;
            text-align: center;
        }
        .hero h1 {
            margin: 0 0 20px;
            font-size: 3rem;
            color: #285c38;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.12);
        }
        .hero p {
            font-size: 1.2rem;
            max-width: 700px;
            margin: 0 auto 30px;
            line-height: 1.6;
            color: #2f4a36;
        }
        .cta-button {
            display: inline-block;
            background: linear-gradient(90deg, #70d677, #2f9854);
            color: white;
            padding: 14px 28px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 12px 24px rgba(46, 118, 83, 0.18);
        }
        .cards {
            display: grid;
            gap: 24px;
            max-width: 1100px;
            margin: 40px auto 60px;
            padding: 0 20px;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: rgba(112, 214, 119, 0.15);
            top: -40px;
            right: -40px;
        }
        .card h2 {
            margin-top: 0;
            color: #1d3b26;
        }
        .card p {
            line-height: 1.7;
            color: #4a5f49;
        }
        .footer {
            text-align: center;
            padding: 24px 20px 40px;
            color: #3b4c3a;
        }
    </style>
</head>
<body>

</body>
</html>
