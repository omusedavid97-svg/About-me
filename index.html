<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2b5acb, #0f1f4f);
            font-family: Arial, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }
        .animated-bg {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: -1;
        }
        .animated-bg span {
            position: absolute;
            display: block;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }
        .animated-bg span:nth-child(1) {
            left: 10%;
            top: 20%;
            animation-delay: 0s;
            animation-duration: 6s;
        }
        .animated-bg span:nth-child(2) {
            right: 12%;
            top: 10%;
            animation-delay: 1.5s;
            animation-duration: 7.5s;
        }
        .animated-bg span:nth-child(3) {
            left: 20%;
            bottom: 15%;
            animation-delay: 3s;
            animation-duration: 9s;
        }
        .animated-bg span:nth-child(4) {
            right: 18%;
            bottom: 20%;
            animation-delay: 2s;
            animation-duration: 8s;
        }
        .animated-bg span:nth-child(5) {
            left: 50%;
            top: 45%;
            animation-delay: 4s;
            animation-duration: 10s;
        }
        @keyframes float {
            0%, 100% {
                transform: translateY(0) scale(1);
                opacity: 0.7;
            }
            50% {
                transform: translateY(-30px) scale(1.1);
                opacity: 0.4;
            }
        }
        .scene {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }
        .person {
            position: absolute;
            left: -140px;
            bottom: 18%;
            width: 120px;
            height: 160px;
            animation: walkFade 4.8s ease-out forwards;
            z-index: 2;
        }
        .person .head {
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.94);
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        .person .torso {
            width: 16px;
            height: 48px;
            background: rgba(255, 255, 255, 0.94);
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 8px;
        }
        .person .arm {
            width: 10px;
            height: 38px;
            background: rgba(255, 255, 255, 0.94);
            position: absolute;
            top: 28px;
            border-radius: 8px;
            transform-origin: top center;
            animation: armSwing 0.8s ease-in-out infinite;
        }
        .person .arm-left {
            left: 16px;
            animation-delay: 0s;
        }
        .person .arm-right {
            right: 14px;
            animation-delay: 0.2s;
        }
        .person .leg {
            width: 10px;
            height: 45px;
            background: rgba(255, 255, 255, 0.94);
            position: absolute;
            top: 68px;
            border-radius: 8px;
            transform-origin: top center;
            animation: legMove 0.8s ease-in-out infinite;
        }
        .person .leg-left {
            left: 26px;
            animation-delay: 0s;
        }
        .person .leg-right {
            right: 26px;
            animation-delay: 0.4s;
        }
        .person .briefcase {
            width: 36px;
            height: 24px;
            background: #ffd56d;
            border-radius: 6px;
            position: absolute;
            top: 42px;
            right: -18px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
            animation: briefcaseDrop 1s ease-in forwards;
            animation-delay: 3.2s;
        }
        .person .briefcase::before {
            content: '';
            position: absolute;
            top: -6px;
            left: 8px;
            width: 20px;
            height: 6px;
            border-radius: 3px;
            background: #ffd56d;
        }
        @keyframes armSwing {
            0%, 100% {
                transform: rotate(20deg);
            }
            50% {
                transform: rotate(-30deg);
            }
        }
        @keyframes legMove {
            0%, 100% {
                transform: rotate(10deg);
            }
            50% {
                transform: rotate(-15deg);
            }
        }
        @keyframes walkFade {
            0% {
                left: -140px;
                opacity: 1;
            }
            65% {
                left: calc(50% - 70px);
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }
        @keyframes briefcaseDrop {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            70% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(160px);
                opacity: 0;
            }
        }
        .login-card {
            position: relative;
            z-index: 1;
            opacity: 0;
            width: min(360px, calc(100vw - 40px));
            padding: 32px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(18px);
            animation: dropFade 0.9s ease-out both;
            animation-delay: 4.5s;
        }
        .login-card h1 {
            margin: 0 0 24px;
            font-size: 1.9rem;
            letter-spacing: 0.02em;
            text-align: center;
        }
        .input-group {
            margin-bottom: 18px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.85);
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }
        .input-group input:focus {
            transform: translateY(-1px);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.32);
        }
        .button {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 14px;
            background: #ffac33;
            color: #0f1f4f;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .button:hover {
            transform: translateY(-2px);
            background: #ffd56d;
        }
        .footer {
            margin-top: 18px;
            text-align: center;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.75);
        }
        @keyframes dropFade {
            from {
                opacity: 0;
                transform: translateY(-40px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>
    <div class="scene">
        <div class="person">
            <div class="head"></div>
            <div class="torso"></div>
            <div class="arm arm-left"></div>
            <div class="arm arm-right"></div>
            <div class="leg leg-left"></div>
            <div class="leg leg-right"></div>
            <div class="briefcase"></div>
        </div>
    </div>
    <div class="login-card">
        <h1>Login</h1>
        <form>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="button">Sign In</button>
        </form>
        <div class="footer">Enter your credentials to access your account.</div>
    </div>
</body>
</html>
